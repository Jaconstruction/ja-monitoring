<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JA Construction | Data Extraction Ready</title>
    <style>
        :root {
            --ja-orange: #FF6B00;
            --ja-dark-main: #121212;
            --ja-sidebar-dark: #1A1A1B;
            --ja-card-dark: #242425;
            --white: #E0E0E0;
            --green: #2ECC71;
            --purple: #9B59B6;
            --red: #E74C3C;
        }

        body {
            background-color: #080808;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--white);
        }

        .main-container {
            width: 1150px;
            height: 680px;
            display: flex;
            background: var(--ja-dark-main);
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 0 80px rgba(0,0,0,0.8);
            border: 1px solid #222;
        }

        /* LEFT PANEL */
        .left-panel {
            flex: 1.8;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: linear-gradient(145deg, #161617 0%, #0c0c0d 100%);
        }

        .sys-clock {
            color: #555;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        .crane-icon {
            font-size: 85px;
            color: var(--ja-orange);
            filter: drop-shadow(0 0 15px rgba(255, 107, 0, 0.4));
        }

        .brand-logo-area h1 {
            font-size: 60px;
            margin: 0;
            font-weight: 900;
            color: var(--ja-orange);
            text-transform: uppercase;
        }

        .timer-display {
            font-size: 165px;
            font-weight: 900;
            margin: 10px 0;
            font-family: 'Arial Black', sans-serif;
            color: #FFF;
        }

        .button-group { width: 90%; display: flex; gap: 20px; }

        .btn {
            flex: 1; padding: 22px; border: none; border-radius: 15px;
            font-size: 24px; font-weight: 900; cursor: pointer;
            text-transform: uppercase; color: white; transition: 0.2s;
        }

        .btn-ot { background-color: var(--purple); }
        .btn-in { background-color: var(--green); }
        .btn-out { background-color: var(--red); }
        .btn:hover { transform: translateY(-3px); filter: brightness(1.1); }

        /* SIDEBAR */
        .sidebar {
            flex: 0.9;
            background-color: var(--ja-sidebar-dark);
            padding: 30px;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #222;
        }

        .sidebar-header {
            background: #000; padding: 15px; border-radius: 15px;
            text-align: center; margin-bottom: 20px; border: 1px solid #333;
        }

        .sidebar-header h2 { color: var(--ja-orange); font-size: 18px; margin: 0; }

        .input-box {
            background: var(--ja-card-dark); padding: 15px; border-radius: 15px;
            margin-bottom: 15px; border-left: 6px solid var(--ja-orange);
        }

        .input-box label { font-size: 10px; font-weight: bold; color: #666; text-transform: uppercase; }

        .input-box input, .input-box .status {
            width: 100%; border: none; background: transparent;
            font-size: 18px; font-weight: 900; margin-top: 5px;
            outline: none; color: var(--white);
        }

        .log-section {
            flex-grow: 1; background: #0D0D0E; border-radius: 15px;
            padding: 15px; border: 1px solid #222; overflow-y: auto; margin-bottom: 15px;
        }

        .log-item {
            display: flex; justify-content: space-between;
            font-size: 11px; padding: 8px 0;
            border-bottom: 1px solid #1A1A1A; color: #888;
        }

        /* EXTRACTION BUTTON */
        .btn-extract {
            background-color: transparent; color: var(--ja-orange);
            border: 1px solid var(--ja-orange); padding: 12px;
            border-radius: 10px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; font-size: 12px; transition: 0.3s;
        }

        .btn-extract:hover { background-color: var(--ja-orange); color: black; }

        .ready-txt { margin-top: 15px; font-weight: bold; color: var(--green); font-size: 13px; }
    </style>
</head>
<body>

<div class="main-container">
    <div class="left-panel">
        <div class="sys-clock" id="sysClock">00:00:00 AM</div>
        <div class="brand-logo-area">
            <div class="crane-icon">🏗️</div>
            <h1>JA CONSTRUCTION</h1>
        </div>
        <div class="timer-display" id="mainTimer">00:00:00</div>
        <div class="button-group">
            <button class="btn btn-ot">OVERTIME</button>
            <button class="btn btn-in" id="actionBtn" onclick="handleTime()">TIME IN</button>
        </div>
        <div class="ready-txt">READY TO RECORD</div>
    </div>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>OFFICIAL MONITOR</h2>
            <div style="font-size: 9px; color: #555;">JA CONSTRUCTION SYSTEM</div>
        </div>
        <div class="input-box">
            <label>Operator Name</label>
            <input type="text" id="opName" placeholder="ENTER NAME...">
        </div>
        <div class="input-box">
            <label>Current Status</label>
            <div id="curStatus" class="status">OFFLINE</div>
        </div>
        <div class="log-section">
            <label style="font-size: 10px; color: #444; margin-bottom: 10px; display: block;">ACTIVITY LOGS</label>
            <div id="logList"></div>
        </div>
        <button class="btn-extract" onclick="extractLogs()">Extract Logs (.txt)</button>
    </div>
</div>

<script>
    let timer;
    let sec = 0;
    let isWorking = false;
    let logData = []; // Array to store logs for extraction

    setInterval(() => {
        document.getElementById('sysClock').innerText = new Date().toLocaleTimeString();
    }, 1000);

    function handleTime() {
        const nameInput = document.getElementById('opName');
        const name = nameInput.value;
        const btn = document.getElementById('actionBtn');
        const status = document.getElementById('curStatus');

        if (!name) { alert("Pakilagay ang pangalan!"); return; }

        if (!isWorking) {
            isWorking = true;
            nameInput.disabled = true;
            btn.innerText = "TIME OUT";
            btn.className = "btn btn-out";
            status.innerText = "ONLINE";
            status.style.color = "#2ECC71";
            addLog("TIME IN", name.toUpperCase());
            timer = setInterval(() => {
                sec++;
                let h = Math.floor(sec / 3600).toString().padStart(2, '0');
                let m = Math.floor((sec % 3600) / 60).toString().padStart(2, '0');
                let s = (sec % 60).toString().padStart(2, '0');
                document.getElementById('mainTimer').innerText = `${h}:${m}:${s}`;
            }, 1000);
        } else {
            isWorking = false;
            clearInterval(timer);
            addLog("TIME OUT", name.toUpperCase(), document.getElementById('mainTimer').innerText);
            btn.innerText = "TIME IN";
            btn.className = "btn btn-in";
            status.innerText = "OFFLINE";
            status.style.color = "#E0E0E0";
            nameInput.disabled = false;
            sec = 0;
            document.getElementById('mainTimer').innerText = "00:00:00";
        }
    }

    function addLog(action, name, duration = "") {
        const list = document.getElementById('logList');
        const now = new Date();
        const dateStr = now.toLocaleDateString(); // "5/15/2026"
        const timeStr = now.toLocaleTimeString(); // "11:05 AM"
        
        // Log entry for display
        const displayMsg = duration ? `${action} (${duration})` : action;
        list.innerHTML = `<div class="log-item"><span>${displayMsg}</span><span>${timeStr}</span></div>` + list.innerHTML;

        // Log entry for extraction (Separated Date and Time)
        // Format: DATE | TIME | OPERATOR | ACTION | DURATION
        const rawLog = `${dateStr} | ${timeStr} | ${name} | ${action} | ${duration || 'N/A'}`;
        logData.push(rawLog);
    }

    function extractLogs() {
        if (logData.length === 0) { alert("Walang logs na pwedeng i-extract!"); return; }
        
        // Header for the text file
        const header = "DATE | TIME | OPERATOR | ACTION | DURATION\n" + "--------------------------------------------------\n";
        const blob = new Blob([header + logData.join('\n')], { type: 'text/plain' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `JA_Construction_Report_${new Date().toLocaleDateString().replace(/\//g, '-')}.txt`;
        a.click();
    }
</script>

</body>
</html>
